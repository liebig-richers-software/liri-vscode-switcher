<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Launch Project</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap");
            @import url("https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0");

            .material-symbols-outlined {
                font-family: 'Material Symbols Outlined';
                font-weight: normal;
                font-style: normal;
                font-size: 24px;
                line-height: 1;
                letter-spacing: normal;
                text-transform: none;
                white-space: nowrap;
                display: inline-block;
                direction: ltr;
                -webkit-font-smoothing: antialiased;
                font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
                user-select: none;
            }

            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: rgba(13, 13, 18, 0.94);
                --border: rgba(255, 255, 255, 0.08);
                --text-dim: rgba(255, 255, 255, 0.45);
                --text-bright: rgba(255, 255, 255, 0.92);
                --radius: 12px;
                --font: "JetBrains Mono", monospace;
            }

            html, body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: transparent;
                font-family: var(--font);
                color: var(--text-bright);
            }

            #panel {
                width: 100%;
                height: 100%;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                backdrop-filter: blur(20px) saturate(1.4);
                -webkit-backdrop-filter: blur(20px) saturate(1.4);
                display: flex;
                flex-direction: column;
                padding: 14px;
                gap: 10px;
            }

            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 2px 4px;
            }
            header .title {
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--text-dim);
            }
            header .hint {
                font-size: 9.5px;
                color: var(--text-dim);
            }

            .scroll {
                overflow-y: auto;
                flex: 1;
                padding: 2px;
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            .scroll::-webkit-scrollbar {
                width: 6px;
            }
            .scroll::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 3px;
            }

            .group-section {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .group-section-label {
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.95);
                padding: 0 2px;
            }
            .group-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }

            .project-btn {
                position: relative;
                aspect-ratio: 1;
                border-radius: 10px;
                border: 1.5px solid transparent;
                background: rgba(255, 255, 255, 0.04);
                cursor: pointer;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 4px;
                transition: all 0.15s ease;
                outline: none;
                overflow: hidden;
                color: inherit;
                font-family: inherit;
            }
            .project-btn::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 9px;
                background: var(--project-color);
                opacity: 0.08;
                transition: opacity 0.15s;
            }
            .project-btn:hover::before {
                opacity: 0.22;
            }
            .project-btn:hover {
                border-color: var(--project-color);
            }
            .project-btn:active {
                transform: scale(0.94);
            }

            .project-btn.no-path {
                cursor: not-allowed;
                opacity: 0.55;
            }
            .project-btn.no-path:hover {
                border-color: transparent;
            }
            .project-btn.no-path:hover::before {
                opacity: 0.08;
            }

            .project-btn.not-found {
                animation: shake 0.3s ease;
            }
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-4px); }
                75% { transform: translateX(4px); }
            }

            .project-icon {
                font-size: 24px;
                line-height: 1;
                position: relative;
                z-index: 1;
                color: var(--project-color);
            }
            .project-label {
                font-size: 8.5px;
                font-weight: 600;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                color: var(--text-bright);
                text-align: center;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 92%;
                position: relative;
                z-index: 1;
            }

            .empty {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text-dim);
                font-size: 12px;
                text-align: center;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <div id="panel">
            <header>
                <span class="title">Launch project</span>
                <span class="hint">Esc to close</span>
            </header>
            <div id="scroll" class="scroll"></div>
        </div>

        <script>
            let config = null;
            let openProjectIds = [];

            function isSymbolName(icon) {
                return typeof icon === "string" && /^[a-z][a-z0-9_]*$/.test(icon);
            }

            function iconHTML(icon) {
                if (isSymbolName(icon)) {
                    return `<span class="project-icon material-symbols-outlined">${icon}</span>`;
                }
                return `<span class="project-icon">${icon || "📁"}</span>`;
            }

            function makeProjectButton(project) {
                const btn = document.createElement("button");
                btn.className = "project-btn" + (project.path ? "" : " no-path");
                btn.dataset.id = project.id;
                btn.style.setProperty("--project-color", project.color || "#666");
                btn.title = project.path
                    ? `Launch: ${project.path}`
                    : `No path configured for ${project.label}`;
                btn.innerHTML = `
                    ${iconHTML(project.icon || "folder")}
                    <span class="project-label">${project.label}</span>
                `;
                btn.addEventListener("click", async () => {
                    if (!project.path) {
                        btn.classList.add("not-found");
                        setTimeout(() => btn.classList.remove("not-found"), 400);
                        return;
                    }
                    await window.launcher.launchProject(project.id);
                    window.launcher.close();
                });
                return btn;
            }

            function render() {
                const scroll = document.getElementById("scroll");
                if (!config) return;

                const inactive = config.projects.filter((p) => !openProjectIds.includes(p.id));

                if (inactive.length === 0) {
                    scroll.innerHTML = `<div class="empty">All configured projects are already open.</div>`;
                    return;
                }

                scroll.innerHTML = "";
                // Bundle projects per group (order = first appearance). Duplicate group
                // entries get merged so each group renders exactly once.
                const groups = new Map();
                for (const project of inactive) {
                    const grp = project.group || "";
                    if (!groups.has(grp)) groups.set(grp, []);
                    groups.get(grp).push(project);
                }
                for (const [grp, groupProjects] of groups) {
                    const section = document.createElement("div");
                    section.className = "group-section";
                    if (grp) {
                        const label = document.createElement("div");
                        label.className = "group-section-label";
                        label.textContent = grp;
                        section.appendChild(label);
                    }
                    const grid = document.createElement("div");
                    grid.className = "group-grid";
                    for (const project of groupProjects) {
                        grid.appendChild(makeProjectButton(project));
                    }
                    section.appendChild(grid);
                    scroll.appendChild(section);
                }
            }

            async function init() {
                config = await window.launcher.getConfig();
                const state = await window.launcher.checkActiveWindow();
                openProjectIds = state.openIds ?? [];
                render();
            }

            window.launcher.onActiveWindow(({ openIds }) => {
                const changed = JSON.stringify(openIds) !== JSON.stringify(openProjectIds);
                openProjectIds = openIds ?? [];
                if (changed) render();
            });

            window.launcher.onConfigUpdated((cfg) => {
                config = cfg;
                render();
            });

            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") window.launcher.close();
            });

            init();
        </script>
    </body>
</html>
