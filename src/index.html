<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>VSCode Switcher</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap");
            @import url("https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0");

            .material-symbols-outlined {
                font-family: 'Material Symbols Outlined';
                font-weight: normal;
                font-style: normal;
                font-size: 20px;
                line-height: 1;
                letter-spacing: normal;
                text-transform: none;
                white-space: nowrap;
                display: inline-block;
                direction: ltr;
                -webkit-font-smoothing: antialiased;
                font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
                user-select: none;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bar-bg: rgba(13, 13, 18, 0.92);
                --bar-border: rgba(255, 255, 255, 0.06);
                --text-dim: rgba(255, 255, 255, 0.35);
                --text-bright: rgba(255, 255, 255, 0.9);
                --active-glow: 0 0 12px currentColor;
                --radius: 10px;
                --font: "JetBrains Mono", monospace;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: transparent;
            }

            #sidebar {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
                height: 100%;
                background: var(--bar-bg);
                border-right: 1px solid var(--bar-border);
                backdrop-filter: blur(20px) saturate(1.4);
                -webkit-backdrop-filter: blur(20px) saturate(1.4);
                padding: 8px 0;
                gap: 6px;
                font-family: var(--font);
                -webkit-app-region: drag;
                transform: translateX(calc(-100% + 3px));
                opacity: 0;
                transition:
                    transform 0.2s ease,
                    opacity 0.2s ease;
            }

            #sidebar.visible {
                transform: translateX(0);
                opacity: 1;
            }

            /* Top logo mark */
            .logo {
                width: 36px;
                height: 36px;
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.08);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                flex-shrink: 0;
                -webkit-app-region: no-drag;
                cursor: grab;
                transition: background 0.2s;
            }
            .logo:hover {
                background: rgba(255, 255, 255, 0.1);
            }
            .logo.dragging {
                cursor: grabbing;
            }

            /* Divider */
            .divider {
                width: 32px;
                height: 1px;
                background: var(--bar-border);
                margin: 4px 0;
                flex-shrink: 0;
            }

            /* Project buttons */
            .projects {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                flex: 0 0 auto;
                width: 100%;
                -webkit-app-region: no-drag;
            }

            .project-btn {
                position: relative;
                width: 52px;
                height: 52px;
                border-radius: var(--radius);
                border: 1.5px solid transparent;
                background: rgba(255, 255, 255, 0.04);
                cursor: pointer;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 3px;
                transition: all 0.15s ease;
                outline: none;
                -webkit-app-region: no-drag;
                overflow: hidden;
            }

            .project-btn::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: calc(var(--radius) - 1px);
                background: var(--project-color);
                opacity: 0;
                transition: opacity 0.15s;
            }

            .project-btn:hover::before {
                opacity: 0.12;
            }
            .project-btn:active {
                transform: scale(0.93);
            }

            .project-btn.active {
                border-color: var(--project-color);
                background: rgba(255, 255, 255, 0.07);
            }
            .project-btn.active::before {
                opacity: 0.15;
            }

            /* Active left accent bar */
            .project-btn.active::after {
                content: "";
                position: absolute;
                left: 0;
                top: 20%;
                width: 3px;
                height: 60%;
                border-radius: 0 3px 3px 0;
                background: var(--project-color);
                box-shadow: 0 0 8px var(--project-color);
            }

            /* Unavailable (window not open) */
            .project-btn.unavailable {
                opacity: 0.3;
                cursor: default;
            }
            .project-btn.unavailable:hover::before {
                opacity: 0;
            }
            .project-btn.unavailable:active {
                transform: none;
            }

            /* Unpinned (unknown VS Code window) */
            .project-btn.unpinned {
                border-style: dashed;
                border-color: rgba(255, 255, 255, 0.18);
                opacity: 0.55;
            }
            .project-btn.unpinned:hover {
                opacity: 0.9;
                border-color: rgba(255, 255, 255, 0.35);
            }
            .project-btn.unpinned:hover::before {
                opacity: 0.08;
            }
            .pin-btn {
                position: absolute;
                top: 2px;
                right: 2px;
                background: none;
                border: none;
                cursor: pointer;
                font-size: 9px;
                color: var(--text-bright);
                opacity: 0;
                z-index: 3;
                padding: 2px 3px;
                border-radius: 3px;
                -webkit-app-region: no-drag;
                transition: opacity 0.15s, background 0.15s;
            }
            .project-btn.unpinned:hover .pin-btn {
                opacity: 0.7;
            }
            .pin-btn:hover {
                opacity: 1 !important;
                background: rgba(255, 255, 255, 0.12);
            }

            /* Not-found flash */
            .project-btn.not-found {
                animation: shake 0.3s ease;
            }
            @keyframes shake {
                0%,
                100% {
                    transform: translateX(0);
                }
                25% {
                    transform: translateX(-4px);
                }
                75% {
                    transform: translateX(4px);
                }
            }

            .project-icon {
                font-size: 20px;
                line-height: 1;
                position: relative;
                z-index: 1;
                color: var(--project-color);
            }

            .project-label {
                font-size: 7.5px;
                font-weight: 600;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                color: var(--text-dim);
                text-align: center;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 48px;
                position: relative;
                z-index: 1;
                transition: color 0.15s;
            }

            .project-btn:hover .project-label,
            .project-btn.active .project-label {
                color: var(--text-bright);
            }

            /* Hotkey badge */
            .hotkey-badge {
                position: absolute;
                top: 3px;
                right: 3px;
                font-size: 6.5px;
                font-family: var(--font);
                color: var(--text-dim);
                font-weight: 600;
                z-index: 2;
            }

            /* Tooltip */
            .project-btn .tooltip {
                position: absolute;
                left: calc(100% + 10px);
                top: 50%;
                transform: translateY(-50%);
                background: rgba(0, 0, 0, 0.85);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 6px;
                padding: 5px 10px;
                font-size: 11px;
                color: var(--text-bright);
                white-space: nowrap;
                pointer-events: none;
                opacity: 0;
                transition: opacity 0.15s;
                z-index: 999;
            }
            .project-btn:hover .tooltip {
                opacity: 1;
            }

            /* Bottom settings button */
            .settings-btn {
                width: 36px;
                height: 36px;
                border-radius: 8px;
                background: transparent;
                border: 1px solid var(--bar-border);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text-dim);
                font-size: 14px;
                transition: all 0.15s;
                -webkit-app-region: no-drag;
                flex-shrink: 0;
            }
            .settings-btn:hover {
                color: var(--text-bright);
                background: rgba(255, 255, 255, 0.07);
                border-color: rgba(255, 255, 255, 0.15);
            }

            /* Loading state */
            #loading {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100%;
                color: var(--text-dim);
                font-size: 18px;
            }
        </style>
    </head>
    <body>
        <div id="sidebar">
            <div id="loading">⋯</div>
        </div>

        <script>
            let config = null;
            let activeWindowTitle = "";
            let openProjectIds = [];
            let unpinnedWindows = [];

            function isSymbolName(icon) {
                return typeof icon === "string" && /^[a-z][a-z0-9_]*$/.test(icon);
            }

            function iconHTML(icon, cls = "") {
                if (isSymbolName(icon)) {
                    return `<span class="project-icon material-symbols-outlined${cls ? " " + cls : ""}">${icon}</span>`;
                }
                return `<span class="project-icon${cls ? " " + cls : ""}">${icon || "📁"}</span>`;
            }

            function colorWithAlpha(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r},${g},${b},${alpha})`;
            }

            function getHotkeyShort(hotkey) {
                if (!hotkey) return "";
                return hotkey.replace("Alt+", "⌥").replace("Ctrl+", "⌃").replace("Shift+", "⇧");
            }

            function getActiveProjectId() {
                if (!config) return null;
                for (const p of config.projects) {
                    if (activeWindowTitle.includes(p.windowTitle)) return p.id;
                }
                return null;
            }

            function updateActiveStates() {
                const activeId = getActiveProjectId();
                document.querySelectorAll(".project-btn:not(.unpinned)").forEach((btn) => {
                    const available = openProjectIds.includes(btn.dataset.id);
                    btn.classList.toggle("active", btn.dataset.id === activeId);
                    btn.classList.toggle("unavailable", !available);
                    btn.disabled = !available;
                });
            }

            // Extract a short label from a VS Code window title
            // e.g. "index.html — myproject — Visual Studio Code" → "myproject"
            function extractVSCodeLabel(title) {
                const stripped = title.replace(/\s[—–-]\s*Visual Studio Code\s*$/, "").trim();
                const parts = stripped.split(/\s[—–-]\s/);
                return parts[parts.length - 1].trim() || "VS Code";
            }

            async function focusProject(id) {
                const btn = document.querySelector(`.project-btn[data-id="${id}"]`);
                if (btn?.disabled) return;
                const result = await window.switcher.focusProject(id);
                if (!result.success && btn) {
                    btn.classList.add("not-found");
                    setTimeout(() => btn.classList.remove("not-found"), 400);
                }
            }

            function renderSidebar() {
                const sidebar = document.getElementById("sidebar");
                sidebar.innerHTML = "";

                // Logo
                const logo = document.createElement("div");
                logo.className = "logo";
                logo.textContent = "⚡";
                logo.title = "VSCode Switcher";
                sidebar.appendChild(logo);

                const divider = document.createElement("div");
                divider.className = "divider";
                sidebar.appendChild(divider);

                // Projects
                const projects = document.createElement("div");
                projects.className = "projects";

                for (const project of config.projects) {
                    const btn = document.createElement("button");
                    btn.className = "project-btn";
                    btn.dataset.id = project.id;
                    btn.style.setProperty("--project-color", project.color || "#666");

                    btn.innerHTML = `
          ${iconHTML(project.icon || "folder")}
          <span class="project-label">${project.label}</span>
          ${project.hotkey ? `<span class="hotkey-badge">${getHotkeyShort(project.hotkey)}</span>` : ""}
          <span class="tooltip">${project.label}${project.hotkey ? ` · ${project.hotkey}` : ""}</span>
        `;

                    btn.addEventListener("click", () => focusProject(project.id));
                    projects.appendChild(btn);
                }

                sidebar.appendChild(projects);

                // Container for unpinned (unknown) VS Code windows
                const unpinnedContainer = document.createElement("div");
                unpinnedContainer.id = "unpinned-container";
                unpinnedContainer.className = "projects";
                sidebar.appendChild(unpinnedContainer);

                // Settings button
                const settingsBtn = document.createElement("button");
                settingsBtn.className = "settings-btn";
                settingsBtn.textContent = "⚙";
                settingsBtn.title = "Configure projects";
                settingsBtn.addEventListener("click", () => window.switcher.openConfigWindow());
                sidebar.appendChild(settingsBtn);

                initDrag(logo);
                renderUnpinnedButtons();
            }

            function syncWindowHeight() {
                // Measure actual rendered height from the DOM instead of a formula.
                // This avoids off-by-N errors from flex gaps, margins, and rounding.
                const sidebarEl = document.getElementById("sidebar");
                const cs = getComputedStyle(sidebarEl);
                const gap = parseFloat(cs.gap) || 0;
                let h = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
                const visibleChildren = [...sidebarEl.children].filter(
                    (c) => getComputedStyle(c).display !== "none",
                );
                visibleChildren.forEach((child) => {
                    const ccs = getComputedStyle(child);
                    h += child.offsetHeight + parseFloat(ccs.marginTop) + parseFloat(ccs.marginBottom);
                });
                h += Math.max(0, visibleChildren.length - 1) * gap;
                window.switcher.resizeWindow(Math.ceil(h));
            }

            function renderUnpinnedButtons() {
                const container = document.getElementById("unpinned-container");
                if (!container) return;
                container.innerHTML = "";
                container.style.display = unpinnedWindows.length > 0 ? "" : "none";

                if (unpinnedWindows.length > 0 && config?.projects.length > 0) {
                    const div = document.createElement("div");
                    div.className = "divider";
                    container.appendChild(div);
                }

                for (const win of unpinnedWindows) {
                    const label = extractVSCodeLabel(win.title);
                    const btn = document.createElement("button");
                    btn.className = "project-btn unpinned";
                    btn.dataset.title = win.title;
                    btn.style.setProperty("--project-color", "#888");
                    btn.innerHTML = `
                        ${iconHTML("window")}
                        <span class="project-label">${label}</span>
                        <button class="pin-btn" title="Pin to config">📌</button>
                        <span class="tooltip">${win.title}</span>
                    `;
                    btn.addEventListener("click", async (e) => {
                        if (e.target.classList.contains("pin-btn")) return;
                        const result = await window.switcher.focusWindowByTitle(win.title);
                        if (!result.success) {
                            btn.classList.add("not-found");
                            setTimeout(() => btn.classList.remove("not-found"), 400);
                        }
                    });
                    btn.querySelector(".pin-btn").addEventListener("click", (e) => {
                        e.stopPropagation();
                        window.switcher.openConfigWindow({ windowTitle: label });
                    });
                    container.appendChild(btn);
                }

                syncWindowHeight();
            }

            // ── Init ──────────────────────────────────────────────────────────────────

            async function init() {
                config = await window.switcher.getConfig();
                renderSidebar();

                // Initial active window check
                const initial = await window.switcher.checkActiveWindow();
                activeWindowTitle = initial.title;
                openProjectIds = initial.openIds;
                unpinnedWindows = initial.unpinnedWindows ?? [];
                updateActiveStates();
                renderUnpinnedButtons();
            }

            // ── Event listeners ───────────────────────────────────────────────────────

            window.switcher.onActiveWindow(({ title, openIds, unpinnedWindows: wins, cursorInWindow }) => {
                activeWindowTitle = title;
                openProjectIds = openIds;
                const changed = JSON.stringify(wins) !== JSON.stringify(unpinnedWindows);
                unpinnedWindows = wins ?? [];
                updateActiveStates();
                if (changed) renderUnpinnedButtons();
                if (sidebarVisible && !cursorInWindow) scheduleHide();
            });

            window.switcher.onConfigUpdated((newConfig) => {
                config = newConfig;
                renderSidebar();
            });

            window.switcher.onFocusResult((result) => {
                if (!result.success) {
                    const btn = document.querySelector(`.project-btn[data-id="${result.id}"]`);
                    if (btn) {
                        btn.classList.add("not-found");
                        setTimeout(() => btn.classList.remove("not-found"), 400);
                    }
                }
            });

            // ── Auto-hide ─────────────────────────────────────────────────────────────

            let hideTimer = null;
            let sidebarVisible = false;
            const sidebar = document.getElementById("sidebar");

            function showSidebar() {
                clearTimeout(hideTimer);
                if (!sidebarVisible) {
                    sidebarVisible = true;
                    window.switcher.setIgnoreMouse(false);
                    sidebar.classList.add("visible");
                }
            }

            function scheduleHide() {
                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    sidebarVisible = false;
                    sidebar.classList.remove("visible");
                    window.switcher.setIgnoreMouse(true);
                }, 500);
            }

            // mousemove fires even when setIgnoreMouseEvents(true, {forward:true}).
            // Only trigger when cursor is at the very left screen edge (clientX <= 1).
            document.addEventListener("mousemove", (e) => {
                if (!sidebarVisible && e.clientX <= 1) showSidebar();
            });
            // Fast path: react immediately on leave. The active-window poll
            // (every 500ms) is the reliable fallback for cases where mouseleave
            // doesn't fire (e.g. after SetForegroundWindow transfers focus).
            sidebar.addEventListener("mouseenter", () => clearTimeout(hideTimer));
            sidebar.addEventListener("mouseleave", scheduleHide);

            // ── Drag to reposition ────────────────────────────────────────────────────

            function initDrag(logo) {
                logo.addEventListener("mousedown", (e) => {
                    e.preventDefault();
                    logo.classList.add("dragging");
                    const startMouseY = e.screenY;
                    const startWinY = window.screenY;

                    const onMove = (e) => {
                        const newY = startWinY + (e.screenY - startMouseY);
                        window.switcher.moveWindow(newY);
                    };

                    const onUp = () => {
                        logo.classList.remove("dragging");
                        window.switcher.saveWindowY(window.screenY);
                        document.removeEventListener("mousemove", onMove);
                        document.removeEventListener("mouseup", onUp);
                    };

                    document.addEventListener("mousemove", onMove);
                    document.addEventListener("mouseup", onUp);
                });
            }

            // ── Init ──────────────────────────────────────────────────────────────────

            init();
        </script>
    </body>
</html>
