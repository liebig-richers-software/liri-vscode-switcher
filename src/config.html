<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>VSCode Switcher — Configure</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0d0d12;
                --surface: rgba(255, 255, 255, 0.04);
                --surface-hover: rgba(255, 255, 255, 0.07);
                --border: rgba(255, 255, 255, 0.08);
                --border-focus: rgba(255, 255, 255, 0.25);
                --text: rgba(255, 255, 255, 0.88);
                --text-dim: rgba(255, 255, 255, 0.4);
                --accent: #3b82f6;
                --danger: #ef4444;
                --success: #10b981;
                --radius: 6px;
                --font: system-ui, -apple-system, sans-serif;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: var(--font);
                font-size: 13px;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* ── Header ── */
            header {
                padding: 14px 20px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
                background: rgba(255, 255, 255, 0.02);
            }

            header h1 {
                font-size: 14px;
                font-weight: 600;
            }

            .header-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .save-feedback {
                font-size: 12px;
                color: var(--success);
                opacity: 0;
                transition: opacity 0.3s;
            }
            .save-feedback.show {
                opacity: 1;
            }

            /* ── Buttons ── */
            .btn {
                padding: 6px 14px;
                border-radius: var(--radius);
                border: 1px solid transparent;
                cursor: pointer;
                font-size: 13px;
                font-weight: 500;
                transition: all 0.15s;
            }
            .btn-primary {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }
            .btn-primary:hover {
                background: #2563eb;
            }
            .btn-secondary {
                background: var(--surface);
                color: var(--text);
                border-color: var(--border);
            }
            .btn-secondary:hover {
                background: var(--surface-hover);
                border-color: var(--border-focus);
            }

            /* ── Column headers ── */
            .col-headers {
                display: grid;
                grid-template-columns: 52px 1fr 1.4fr 38px 100px 28px;
                gap: 8px;
                padding: 10px 20px 6px;
                flex-shrink: 0;
            }

            .col-label {
                font-size: 10px;
                color: var(--text-dim);
                text-transform: uppercase;
                letter-spacing: 0.06em;
                font-weight: 600;
            }

            /* ── Scrollable list ── */
            main {
                flex: 1;
                overflow-y: auto;
                padding: 0 20px 16px;
            }

            main::-webkit-scrollbar {
                width: 5px;
            }
            main::-webkit-scrollbar-track {
                background: transparent;
            }
            main::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 3px;
            }

            /* ── Project rows ── */
            .project-list {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .project-row {
                display: grid;
                grid-template-columns: 52px 1fr 1.4fr 38px 100px 28px;
                gap: 8px;
                align-items: center;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 8px 12px;
                transition: border-color 0.15s;
            }

            .project-row:focus-within {
                border-color: var(--border-focus);
            }

            .project-row.new-row {
                border-color: var(--accent);
                animation: flash 0.6s ease;
            }

            @keyframes flash {
                from {
                    background: rgba(59, 130, 246, 0.12);
                }
                to {
                    background: var(--surface);
                }
            }

            /* ── Inputs ── */
            input[type="text"] {
                width: 100%;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--text);
                font-size: 12px;
                padding: 5px 7px;
                outline: none;
                transition: border-color 0.15s;
            }
            input[type="text"]:focus {
                border-color: var(--border-focus);
            }
            input[type="text"]::placeholder {
                color: var(--text-dim);
            }

            input[type="color"] {
                width: 100%;
                height: 28px;
                padding: 2px 3px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--border);
                border-radius: 4px;
                cursor: pointer;
                outline: none;
            }

            .icon-input {
                text-align: center;
                font-size: 17px;
                padding: 3px 4px;
            }

            /* ── Delete button ── */
            .delete-btn {
                width: 28px;
                height: 28px;
                background: none;
                border: none;
                color: var(--text-dim);
                cursor: pointer;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                transition: all 0.15s;
                flex-shrink: 0;
            }
            .delete-btn:hover {
                color: var(--danger);
                background: rgba(239, 68, 68, 0.1);
            }

            /* ── Add button ── */
            .add-btn {
                margin-top: 8px;
                width: 100%;
                padding: 8px;
                background: none;
                border: 1px dashed var(--border);
                border-radius: var(--radius);
                color: var(--text-dim);
                cursor: pointer;
                font-size: 13px;
                transition: all 0.15s;
            }
            .add-btn:hover {
                border-color: rgba(255, 255, 255, 0.2);
                color: var(--text);
                background: var(--surface);
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Configure Projects</h1>
            <div class="header-right">
                <span class="save-feedback" id="save-feedback">Saved ✓</span>
                <button class="btn btn-secondary" onclick="window.configUI.closeWindow()">Close</button>
                <button class="btn btn-primary" onclick="save()">Save</button>
            </div>
        </header>

        <div class="col-headers">
            <div class="col-label">Icon</div>
            <div class="col-label">Label</div>
            <div class="col-label">Window Title</div>
            <div class="col-label">Color</div>
            <div class="col-label">Hotkey</div>
            <div></div>
        </div>

        <main>
            <div class="project-list" id="project-list"></div>
            <button class="add-btn" onclick="addRow()">+ Add Project</button>
        </main>

        <script>
            let config = null;

            function esc(s) {
                return String(s ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/"/g, "&quot;")
                    .replace(/</g, "&lt;");
            }

            function makeRow(project = {}, isNew = false) {
                const row = document.createElement("div");
                row.className = "project-row" + (isNew ? " new-row" : "");
                row.dataset.id = project.id || "";
                row.innerHTML = `
                    <input class="icon-input" type="text" value="${esc(project.icon ?? "📁")}" maxlength="4" title="Icon (emoji)">
                    <input type="text" value="${esc(project.label)}" placeholder="Label">
                    <input type="text" value="${esc(project.windowTitle)}" placeholder="Part of VS Code window title">
                    <input type="color" value="${esc(project.color ?? "#3b82f6")}">
                    <input type="text" value="${esc(project.hotkey)}" placeholder="e.g. Alt+1">
                    <button class="delete-btn" title="Remove" onclick="this.closest('.project-row').remove()">✕</button>
                `;
                return row;
            }

            function addRow(prefill = {}) {
                const list = document.getElementById("project-list");
                const row = makeRow(prefill, true);
                list.appendChild(row);
                row.scrollIntoView({ behavior: "smooth", block: "nearest" });
                row.querySelectorAll("input")[1].focus();
            }

            function collectProjects() {
                return [...document.querySelectorAll(".project-row")]
                    .map((row) => {
                        const inputs = row.querySelectorAll("input");
                        const label = inputs[1].value.trim();
                        const windowTitle = inputs[2].value.trim();
                        if (!label || !windowTitle) return null;
                        return {
                            id: row.dataset.id || label.toLowerCase().replace(/\s+/g, "-") + "-" + Date.now().toString(36),
                            icon: inputs[0].value.trim() || "📁",
                            label,
                            windowTitle,
                            color: inputs[3].value,
                            hotkey: inputs[4].value.trim() || undefined,
                        };
                    })
                    .filter(Boolean);
            }

            async function save() {
                const projects = collectProjects();
                const newConfig = { ...config, projects };
                await window.configUI.saveConfig(newConfig);
                config = newConfig;
                // Update stored IDs on rows so re-saves don't generate new IDs
                document.querySelectorAll(".project-row").forEach((row, i) => {
                    if (projects[i]) row.dataset.id = projects[i].id;
                });
                const fb = document.getElementById("save-feedback");
                fb.classList.add("show");
                setTimeout(() => fb.classList.remove("show"), 2000);
            }

            async function init() {
                config = await window.configUI.getConfig();
                const list = document.getElementById("project-list");
                for (const p of config.projects) {
                    list.appendChild(makeRow(p));
                }
            }

            window.configUI.onPrefillProject((data) => {
                addRow(data);
            });

            init();
        </script>
    </body>
</html>
