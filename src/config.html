        <style>
            @import url("https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0");

            .material-symbols-outlined {
                font-family: 'Material Symbols Outlined';
                font-weight: normal;
                font-style: normal;
                font-size: 20px;
                line-height: 1;
                letter-spacing: normal;
                text-transform: none;
                white-space: nowrap;
                display: inline-block;
                direction: ltr;
                -webkit-font-smoothing: antialiased;
                font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
                user-select: none;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0d0d12;
                --surface: rgba(255, 255, 255, 0.04);
                --surface-hover: rgba(255, 255, 255, 0.07);
                --border: rgba(255, 255, 255, 0.08);
                --border-focus: rgba(255, 255, 255, 0.25);
                --text: rgba(255, 255, 255, 0.88);
                --text-dim: rgba(255, 255, 255, 0.4);
                --accent: #3b82f6;
                --danger: #ef4444;
                --success: #10b981;
                --radius: 6px;
                --font: system-ui, -apple-system, sans-serif;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: var(--font);
                font-size: 13px;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* ── Header ── */
            header {
                padding: 14px 20px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
                background: rgba(255, 255, 255, 0.02);
            }

            header h1 {
                font-size: 14px;
                font-weight: 600;
            }

            .header-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .save-feedback {
                font-size: 12px;
                color: var(--success);
                opacity: 0;
                transition: opacity 0.3s;
            }
            .save-feedback.show {
                opacity: 1;
            }

            /* ── Buttons ── */
            .btn {
                padding: 6px 14px;
                border-radius: var(--radius);
                border: 1px solid transparent;
                cursor: pointer;
                font-size: 13px;
                font-weight: 500;
                transition: all 0.15s;
            }
            .btn-primary {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }
            .btn-primary:hover {
                background: #2563eb;
            }
            .btn-secondary {
                background: var(--surface);
                color: var(--text);
                border-color: var(--border);
            }
            .btn-secondary:hover {
                background: var(--surface-hover);
                border-color: var(--border-focus);
            }

            /* ── Column headers ── */
            .col-headers {
                display: grid;
                grid-template-columns: 18px 52px 1fr 1fr 1fr 38px 80px 28px;
                gap: 8px;
                padding: 10px 20px 6px;
                flex-shrink: 0;
            }

            .col-label {
                font-size: 10px;
                color: var(--text-dim);
                text-transform: uppercase;
                letter-spacing: 0.06em;
                font-weight: 600;
            }

            /* ── Scrollable list ── */
            main {
                flex: 1;
                overflow-y: auto;
                padding: 0 20px 16px;
            }

            main::-webkit-scrollbar {
                width: 5px;
            }
            main::-webkit-scrollbar-track {
                background: transparent;
            }
            main::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 3px;
            }

            /* ── Project rows ── */
            .project-list {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .project-row {
                display: grid;
                grid-template-columns: 18px 52px 1fr 1fr 1fr 38px 80px 28px;
                gap: 8px;
                align-items: center;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 8px 12px;
                transition: border-color 0.15s, opacity 0.15s, background 0.15s;
            }

            .project-row:focus-within {
                border-color: var(--border-focus);
            }

            .project-row.new-row {
                border-color: var(--accent);
                animation: flash 0.6s ease;
            }

            .project-row.dragging {
                opacity: 0.35;
            }

            .project-row.drop-above {
                box-shadow: 0 -2px 0 0 var(--accent);
            }

            .project-row.drop-below {
                box-shadow: 0 2px 0 0 var(--accent);
            }

            .drag-handle {
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text-dim);
                cursor: grab;
                opacity: 0;
                transition: opacity 0.15s;
                font-size: 18px;
            }

            .project-row:hover .drag-handle {
                opacity: 1;
            }

            .drag-handle:active {
                cursor: grabbing;
            }

            @keyframes flash {
                from {
                    background: rgba(59, 130, 246, 0.12);
                }
                to {
                    background: var(--surface);
                }
            }

            /* ── Inputs ── */
            input[type="text"] {
                width: 100%;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--text);
                font-size: 12px;
                padding: 5px 7px;
                outline: none;
                transition: border-color 0.15s;
            }
            input[type="text"]:focus {
                border-color: var(--border-focus);
            }
            input[type="text"]::placeholder {
                color: var(--text-dim);
            }

            input[type="color"] {
                width: 100%;
                height: 28px;
                padding: 2px 3px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--border);
                border-radius: 4px;
                cursor: pointer;
                outline: none;
            }

            .icon-btn {
                width: 100%;
                height: 28px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--border);
                color: var(--text);
                border-radius: 4px;
                cursor: pointer;
                font-size: 17px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: border-color 0.15s;
            }
            .icon-btn:hover { border-color: var(--border-focus); }

            /* Icon picker popup */
            .icon-picker {
                position: fixed;
                background: #1a1a24;
                border: 1px solid var(--border-focus);
                border-radius: 8px;
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 6px;
                z-index: 1000;
                box-shadow: 0 8px 24px rgba(0,0,0,0.5);
                width: 316px;
            }
            .icon-search {
                width: 100%;
                background: rgba(255,255,255,0.06);
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--text);
                font-size: 12px;
                padding: 5px 8px;
                outline: none;
                flex-shrink: 0;
            }
            .icon-search:focus { border-color: var(--border-focus); }
            .icon-search::placeholder { color: var(--text-dim); }
            .icon-grid {
                display: grid;
                grid-template-columns: repeat(10, 28px);
                gap: 4px;
                max-height: 200px;
                overflow-y: auto;
            }
            .icon-grid::-webkit-scrollbar { width: 4px; }
            .icon-grid::-webkit-scrollbar-track { background: transparent; }
            .icon-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
            .icon-grid-empty {
                font-size: 11px;
                color: var(--text-dim);
                text-align: center;
                padding: 12px 0;
            }
            .icon-picker button {
                width: 34px;
                height: 34px;
                background: none;
                border: 1px solid transparent;
                border-radius: 4px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.1s;
                color: rgba(255,255,255,0.7);
            }
            .icon-picker button:hover {
                background: rgba(255,255,255,0.1);
                border-color: rgba(255,255,255,0.2);
                color: #fff;
            }
            .icon-grid {
                grid-template-columns: repeat(8, 34px) !important;
            }

            /* ── Path cell ── */
            .path-cell {
                display: flex;
                gap: 4px;
                align-items: center;
                min-width: 0;
            }
            .path-cell input {
                flex: 1;
                min-width: 0;
            }
            .browse-btn {
                flex-shrink: 0;
                width: 26px;
                height: 28px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--border);
                border-radius: 4px;
                color: var(--text-dim);
                cursor: pointer;
                font-size: 13px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: border-color 0.15s, color 0.15s;
            }
            .browse-btn:hover {
                border-color: var(--border-focus);
                color: var(--text);
            }

            /* ── Delete button ── */
            .delete-btn {
                width: 28px;
                height: 28px;
                background: none;
                border: none;
                color: var(--text-dim);
                cursor: pointer;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                transition: all 0.15s;
                flex-shrink: 0;
            }
            .delete-btn:hover {
                color: var(--danger);
                background: rgba(239, 68, 68, 0.1);
            }

            /* ── Add button ── */
            .add-btn {
                margin-top: 8px;
                width: 100%;
                padding: 8px;
                background: none;
                border: 1px dashed var(--border);
                border-radius: var(--radius);
                color: var(--text-dim);
                cursor: pointer;
                font-size: 13px;
                transition: all 0.15s;
            }
            .add-btn:hover {
                border-color: rgba(255, 255, 255, 0.2);
                color: var(--text);
                background: var(--surface);
            }
        </style>
    </head>

            function clearDropIndicators() {
                document.querySelectorAll('.project-row.drop-above, .project-row.drop-below')
                    .forEach(r => r.classList.remove('drop-above', 'drop-below'));
            }

            function getDropPosition(row, clientY) {
                const rect = row.getBoundingClientRect();
                return clientY < rect.top + rect.height / 2 ? 'above' : 'below';
            }

            function addDragHandlers(row) {
                const handle = row.querySelector('.drag-handle');

                handle.addEventListener('mousedown', () => {
                    row.setAttribute('draggable', 'true');
                });

                row.addEventListener('dragstart', (e) => {
                    dragSrc = row;
                    e.dataTransfer.effectAllowed = 'move';
                    requestAnimationFrame(() => row.classList.add('dragging'));
                });

                row.addEventListener('dragend', () => {
                    row.removeAttribute('draggable');
                    row.classList.remove('dragging');
                    clearDropIndicators();
                    dragSrc = null;
                });

                row.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (!dragSrc || dragSrc === row) return;
                    clearDropIndicators();
                    const pos = getDropPosition(row, e.clientY);
                    row.classList.add(pos === 'above' ? 'drop-above' : 'drop-below');
                });

                row.addEventListener('dragleave', (e) => {
                    if (!row.contains(e.relatedTarget)) row.classList.remove('drop-above', 'drop-below');
                });

                row.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (!dragSrc || dragSrc === row) return;
                    const pos = getDropPosition(row, e.clientY);
                    clearDropIndicators();
                    if (pos === 'above') {
                        row.before(dragSrc);
                    } else {
                        row.after(dragSrc);
                    }
                });
            }

            function openIconPicker(btn) {
                if (activePicker) { activePicker.remove(); activePicker = null; }

                const picker = document.createElement("div");
                picker.className = "icon-picker";

                const searchInput = document.createElement("input");
                searchInput.type = "text";
                searchInput.className = "icon-search";
                searchInput.placeholder = "Suchen… (react, rechnung, module…)";
                picker.appendChild(searchInput);

                const grid = document.createElement("div");
                grid.className = "icon-grid";
                picker.appendChild(grid);

                function renderGrid(query) {
                    grid.innerHTML = "";
                    const q = query.trim().toLowerCase();
                    const filtered = q
                        ? ICONS.filter(([name, kw]) => name.includes(q) || kw.includes(q))
                        : ICONS;
                    if (filtered.length === 0) {
                        const empty = document.createElement("div");
                        empty.className = "icon-grid-empty";
                        empty.textContent = "Keine Treffer";
                        grid.appendChild(empty);
                        return;
                    }
                    for (const [name] of filtered) {
                        const b = document.createElement("button");
                        b.type = "button";
                        b.title = name.replace(/_/g, " ");
                        b.innerHTML = `<span class="material-symbols-outlined">${name}</span>`;
                        b.addEventListener("click", () => {
                            setIconBtnContent(btn, name);
                            picker.remove();
                            activePicker = null;
                        });
                        grid.appendChild(b);
                    }
                }

                renderGrid("");
                searchInput.addEventListener("input", () => renderGrid(searchInput.value));

                document.body.appendChild(picker);
                activePicker = picker;

                // Position below button, clamped to viewport
                const rect = btn.getBoundingClientRect();
                const pw = picker.offsetWidth;
                const ph = picker.offsetHeight;
                let top = rect.bottom + 4;
                let left = rect.left;
                if (left + pw > window.innerWidth - 4) left = window.innerWidth - pw - 4;
                if (left < 4) left = 4;
                if (top + ph > window.innerHeight - 4) top = rect.top - ph - 4;
                if (top < 4) top = 4;
                picker.style.top = top + "px";
                picker.style.left = left + "px";

                searchInput.focus();

                setTimeout(() => {
                    document.addEventListener("click", function close(e) {
                        if (!picker.contains(e.target) && e.target !== btn) {
                            picker.remove();
                            activePicker = null;
                            document.removeEventListener("click", close);
                        }
                    });
                }, 0);
            }

            function esc(s) {
                return String(s ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/"/g, "&quot;")
                    .replace(/</g, "&lt;");
            }

            function makeRow(project = {}, isNew = false) {
                const row = document.createElement("div");
                row.className = "project-row" + (isNew ? " new-row" : "");
                row.dataset.id = project.id || "";

                const icon = project.icon ?? "folder";
                const iconBtn = document.createElement("button");
                iconBtn.type = "button";
                iconBtn.className = "icon-btn";
                iconBtn.title = "Choose icon";
                setIconBtnContent(iconBtn, icon);
                iconBtn.addEventListener("click", () => openIconPicker(iconBtn));

                row.innerHTML = `
                    <span class="drag-handle material-symbols-outlined">drag_indicator</span>
                    <span></span>
                    <input type="text" value="${esc(project.label)}" placeholder="Label">
                    <input type="text" value="${esc(project.windowTitle)}" placeholder="Part of VS Code window title">
                    <div class="path-cell"><input type="text" value="${esc(project.path)}" placeholder="Folder path (optional)"><button type="button" class="browse-btn" title="Browse…">📂</button></div>
                    <input type="color" value="${esc(project.color ?? "#3b82f6")}">
                    <input type="text" value="${esc(project.hotkey)}" placeholder="e.g. Alt+1">
                    <button class="delete-btn" title="Remove" onclick="this.closest('.project-row').remove()">✕</button>
                `;
                row.children[1].replaceWith(iconBtn);

                const browseBtn = row.querySelector(".browse-btn");
                const pathInput = row.querySelector(".path-cell input");
                browseBtn.addEventListener("click", async () => {
                    const folder = await window.configUI.selectFolder();
                    if (folder) pathInput.value = folder;
                });

                addDragHandlers(row);
                return row;
            }

            function addRow(prefill = {}) {
                const list = document.getElementById("project-list");
                const row = makeRow(prefill, true);
                list.appendChild(row);
                row.scrollIntoView({ behavior: "smooth", block: "nearest" });
                row.querySelectorAll("input")[0].focus();
            }

            function collectProjects() {
                return [...document.querySelectorAll(".project-row")]
                    .map((row) => {
                        const iconBtn = row.querySelector(".icon-btn");
                        const inputs = row.querySelectorAll("input");
                        const label = inputs[0].value.trim();
                        const windowTitle = inputs[1].value.trim();
                        if (!label || !windowTitle) return null;
                        return {
                            id: row.dataset.id || label.toLowerCase().replace(/\s+/g, "-") + "-" + Date.now().toString(36),
                            icon: iconBtn?.dataset.value || "folder",
                            label,
                            windowTitle,
                            path: inputs[2].value.trim() || undefined,
                            color: inputs[3].value,
                            hotkey: inputs[4].value.trim() || undefined,
                        };
                    })
                    .filter(Boolean);
            }

            async function save() {
                const projects = collectProjects();
                const newConfig = { ...config, projects };
                await window.configUI.saveConfig(newConfig);
                config = newConfig;
                // Update stored IDs on rows so re-saves don't generate new IDs
                document.querySelectorAll(".project-row").forEach((row, i) => {
                    if (projects[i]) row.dataset.id = projects[i].id;
                });
                const fb = document.getElementById("save-feedback");
                fb.classList.add("show");
                setTimeout(() => fb.classList.remove("show"), 2000);
            }

            async function init() {
                config = await window.configUI.getConfig();
                const list = document.getElementById("project-list");
                for (const p of config.projects) {
                    list.appendChild(makeRow(p));
                }
            }

            window.configUI.onPrefillProject((data) => {
                addRow(data);
            });

            init();
        </script>
    </body>
</html>
